{% extends "analytics/base.html" %}

{% block title %}Login | Supply Chain Operations Platform{% endblock %}

{% block content %}
<div class="login-wrap">
    <div class="login-panel">
        <div class="mb-4">
            <h1 class="h3 mb-2">Supply Chain Operations Insight Platform</h1>
        </div>
        <form method="post" class="vstack gap-3">
            {% csrf_token %}
            {% if form.errors %}
                <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <div>
                <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                <input type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" class="form-control" autofocus required>
            </div>
            <div>
                <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                <input type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</div>
{% endblock %}
