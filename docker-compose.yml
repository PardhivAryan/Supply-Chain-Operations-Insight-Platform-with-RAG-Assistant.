services:
  web:
    build: .
    container_name: supply-chain-operations-platform
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: local-docker-secret-key-only
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0
      SQLITE_NAME: /app/db.sqlite3
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  staticfiles:
